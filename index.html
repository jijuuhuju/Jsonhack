<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Scratch JSON ハック生成器</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .container { display: flex; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sidebar { flex: 1; }
        .main { flex: 2; }
        .block-item { background: #4c97ff; color: white; padding: 10px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #10b981; color: white; border: none; padding: 10px; width: 100%; font-size: 1.1rem; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Scratch JSON ハック生成器</h2>
    <div class="container">
        <div class="panel sidebar" id="block-list"></div>
        <div class="panel main">
            <h3>編集</h3>
            <div id="editor-fields"></div>
            <button id="download-btn">project.json をダウンロード</button>
        </div>
    </div>
    <script>
        // 簡易版のJSON生成ロジック
        const projectTemplate = (blockData) => ({
            "targets": [{"isStage":true,"name":"Stage","blocks":{}},{"isStage":false,"name":"Hacked","blocks":{"hacked_id":blockData},"costumes":[]}],
            "meta": {"semver": "3.0.0"}
        });
        const presets = {
            say: {
                name: "💬 [言う] ハック",
                fields: [{id: "text", label: "セリフ", default: "ハック成功"}],
                gen: (inputs) => ({ "opcode": "looks_say", "inputs": { "MESSAGE": [2, [3, [12, inputs.text, ""], [10, ""]]] } })
            },
            key: {
                name: "⌨ [キー] ハック",
                fields: [{id: "key", label: "キー名", default: "enter"}],
                gen: (inputs) => ({ "opcode": "sensing_keypressed", "fields": { "KEY_OPTION": [inputs.key, null] } })
            }
        };
        // UIロジック（ブロック選択、入力反映、ダウンロード）
        // ... (詳細は元の長いスクリプトに基づくが、ここでは機能概要とする)
    </script>
</body>
</html>
