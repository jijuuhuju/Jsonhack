<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch JSON Hack Tool (Beta)</title>
    <!-- お気に入りのアイコンをタブに反映 -->
    <link rel="icon" href="icon.png" type="image/png">
    <!-- JSZipライブラリ（sb3の解凍・圧縮用） -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f3f4f6; color: #1f2937; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea { width: 100%; height: 250px; font-family: monospace; margin-top: 10px; background: #1e1e1e; color: #7ec699; padding: 10px; border-radius: 4px; border: none; box-sizing: border-radius; }
        
        /* ボタンの共通スタイル */
        button { font-weight: bold; padding: 10px 20px; border-radius: 4px; cursor: pointer; border: none; transition: background 0.2s; }
        
        /* メインの青ボタン */
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }

        /* ハック用のオレンジボタン */
        .btn-hack { background: #f59e0b; color: white; margin-right: 10px; margin-bottom: 10px; }
        .btn-hack:hover { background: #d97706; }
        .btn-hack:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

        .flex-container { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <img src="icon.png" alt="Icon" style="width: 50px; height: 50px; border-radius: 8px;">
        <h1 style="margin: 0;">Scratch JSON ハックツール</h1>
    </div>
    
    <p>ファイルをアップロードして、自動ハックボタンを押すだけでチート作品が作れます。</p>

    <!-- 1. ファイルの読み込み -->
    <div class="box">
        <h3>1. .sb3 ファイルをアップロード</h3>
        <input type="file" id="file-input" accept=".sb3">
    </div>

    <!-- 2. 自動ワンクリック・ハック機能 -->
    <div class="box">
        <h3>2. 自動ハックを実行する</h3>
        <p style="font-size: 0.9rem; color: #6b7280;">※ファイルを読み込んだ後に押せるようになります</p>
        
        <!-- 変数巨大化ハックボタン -->
        <button id="hack-var-btn" class="btn-hack" disabled>
            💥 ステージ上の「変数」を巨大化・改行ハック
        </button>
        
        <p id="hack-status" style="color: #059669; font-weight: bold; margin-top: 5px;"></p>
    </div>

    <!-- 3. JSONの確認・直接ハック -->
    <div class="box">
        <h3>3. project.json の中身 (手動編集も可能)</h3>
        <textarea id="json-textarea" placeholder="ここにJSONが表示されます..."></textarea>
    </div>

    <!-- 4. 書き換えてダウンロード -->
    <div class="box">
        <h3>4. ハック済みファイルを保存</h3>
        <button id="download-btn" class="btn-primary" disabled>ハック済み .sb3 をダウンロード</button>
    </div>

    <script>
        let loadedZip = null; // 読み込んだZIP（sb3）データを保持

        // ファイルが選択された時の処理
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const jsZip = new JSZip();
            try {
                loadedZip = await jsZip.loadAsync(file);
                
                if (loadedZip.file("project.json")) {
                    const jsonText = await loadedZip.file("project.json").async("string");
                    const jsonObject = JSON.parse(jsonText);
                    
                    // 画面に反映
                    updateJsonTextArea(jsonObject);
                    
                    // ボタン類を有効化
                    document.getElementById('hack-var-btn').disabled = false;
                    document.getElementById('download-btn').disabled = false;
                    document.getElementById('hack-status').innerText = "ファイルを読み込みました。ハックを選択してください。";
                } else {
                    alert("有効なScratchファイルではありません。");
                }
            } catch (err) {
                alert("ファイルの読み込みエラー: " + err.message);
            }
        });

        // テキストエリアの文字を更新する共通関数
        function updateJsonTextArea(obj) {
            document.getElementById('json-textarea').value = JSON.stringify(obj, null, 2);
        }

        // 💥 変数巨大化ハックの処理
        document.getElementById('hack-var-btn').addEventListener('click', () => {
            try {
                // テキストエリアから現在の最新JSONを取得してパース
                const currentJson = JSON.parse(document.getElementById('json-textarea').value);
                
                let hackedCount = 0;

                // Scratchの「ステージに表示されている変数（monitors）」を探すループ
                if (currentJson.monitors && Array.isArray(currentJson.monitors)) {
                    currentJson.monitors.forEach(monitor => {
                        // それが変数（idを持つもの）であれば、名前の前に大量の改行とスペースを仕込む
                        if (monitor.params && monitor.params.VARIABLE) {
                            // 既存の名前を取得
                            const originalName = monitor.params.VARIABLE;
                            
                            // すでにハックされていなければ実行
                            if (!originalName.includes("\n")) {
                                // 大量の改行とスペースでステージ上の表示枠をバグらせる
                                monitor.params.VARIABLE = "\n\n\n\n\n\n\n\n\n    " + originalName;
                                hackedCount++;
                            }
                        }
                    });
                }

                if (hackedCount > 0) {
                    // 書き換えたJSONを画面に再表示
                    updateJsonTextArea(currentJson);
                    document.getElementById('hack-status').innerText = `🔥 ${hackedCount}個の変数をバグらせることに成功しました！ステップ4でダウンロードしてください。`;
                } else {
                    document.getElementById('hack-status').innerText = "⚠ ステージ上に表示されている変数（モニター）が見つからないか、既にハック済みです。";
                }

            } catch (err) {
                alert("ハックに失敗しました。JSONの形式が壊れている可能性があります: " + err.message);
            }
        });

        // ダウンロードボタンが押された時の処理
        document.getElementById('download-btn').addEventListener('click', async () => {
            if (!loadedZip) return;

            try {
                const editedJsonText = document.getElementById('json-textarea').value;
                JSON.parse(editedJsonText); // 構文チェック

                // ZIP内の project.json を上書きして再圧縮
                loadedZip.file("project.json", editedJsonText);
                const hakedBlob = await loadedZip.generateAsync({ type: "blob" });

                // ダウンロード発火
                const url = URL.createObjectURL(hakedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "hacked_project.sb3";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                alert("保存エラー: " + err.message);
            }
        });
    </script>
</body>
</html>
